<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 44" fill="none">
  <!-- Screen at 16:10 with a magnifying glass inspecting the crack -->
  <!-- Top edge -->
  <line x1="4" y1="4" x2="68" y2="4" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left edge -->
  <line x1="4" y1="4" x2="4" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right edge -->
  <line x1="68" y1="4" x2="68" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom edge — split with a gap -->
  <line x1="4" y1="40" x2="28" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="68" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crack in the gap -->
  <path d="M28 40 L31 44 L34 36 L37 44 L40 36 L44 40" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <!-- Magnifying glass — lens circle (centered, not touching walls) -->
  <circle cx="34" cy="21" r="8" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Magnifying glass — handle -->
  <line x1="39.5" y1="27" x2="46" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inside the lens: two small rects slightly misaligned -->
  <rect x="28" y="17.5" width="5" height="3.5" rx="0.5" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <rect x="34" y="19" width="5" height="3.5" rx="0.5" stroke="white" stroke-width="1.2" opacity="0.6"/>
</svg>
