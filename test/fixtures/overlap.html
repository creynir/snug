<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sibling Overlap Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; padding: 40px; }

    .overlap-section { position: relative; height: 300px; margin-bottom: 40px; }

    /* Same z-index — should be error */
    .box-a {
      position: absolute;
      left: 100px;
      top: 0;
      width: 200px;
      height: 200px;
      background: rgba(231, 76, 60, 0.7);
    }
    .box-b {
      position: absolute;
      left: 250px;
      top: 50px;
      width: 200px;
      height: 200px;
      background: rgba(52, 152, 219, 0.7);
    }

    /* Different z-index — should be warning */
    .layer-base {
      position: absolute;
      left: 0;
      top: 0;
      width: 300px;
      height: 200px;
      background: #95a5a6;
      z-index: 1;
    }
    .layer-top {
      position: absolute;
      left: 100px;
      top: 50px;
      width: 300px;
      height: 200px;
      background: rgba(46, 204, 113, 0.7);
      z-index: 10;
    }

    /* No overlap — should pass clean */
    .no-overlap { display: flex; gap: 20px; margin-top: 40px; }
    .no-overlap .item { width: 200px; height: 100px; background: #bdc3c7; }
  </style>
</head>
<body>
  <!-- Same z-index overlap: error -->
  <section class="overlap-section">
    <div class="box-a">Box A (z-index: auto)</div>
    <div class="box-b">Box B (z-index: auto)</div>
  </section>

  <!-- Different z-index overlap: warning -->
  <section class="overlap-section">
    <div class="layer-base">Base layer (z-index: 1)</div>
    <div class="layer-top">Top layer (z-index: 10)</div>
  </section>

  <!-- No overlap: clean -->
  <div class="no-overlap">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>
</body>
</html>
