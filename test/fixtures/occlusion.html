<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Occlusion Fixture</title></head>
<body style="margin:0; font-family:sans-serif;">

  <!-- Scenario A: Panel covering text (should flag as error) -->
  <div id="text-section" style="position:relative; width:400px; height:200px; margin:20px;">
    <p id="covered-text">This text should be flagged as occluded</p>
    <div id="covering-panel" style="position:absolute; top:0; left:0; width:100%; height:100%; background:white; z-index:10;"></div>
  </div>

  <!-- Scenario B: Modal backdrop — intentional overlay (should NOT flag) -->
  <p id="behind-modal">This text is behind a modal</p>
  <div id="modal-backdrop" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000;"></div>

  <!-- Scenario C: Semi-transparent overlay (should flag as warning) -->
  <div id="semi-section" style="position:relative; width:400px; height:200px; margin:20px;">
    <p id="semi-covered-text">This text has a semi-transparent overlay</p>
    <div id="semi-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0.3; z-index:10;"></div>
  </div>

</body>
</html>
